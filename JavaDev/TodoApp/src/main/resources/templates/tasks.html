<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#74ebd5,#9face6);
            min-height:100vh;
        }

        .todo-card{
            max-width:700px;
            margin: 60px auto auto;
            border:none;
            border-radius:20px;
            box-shadow:0 15px 40px rgba(0,0,0,.2);
        }

        .task-item{
            transition:.3s;
            border-radius:10px;
        }

        .task-item:hover{
            transform:translateY(-2px);
            box-shadow:0 5px 15px rgba(0,0,0,.1);
        }

        .task-title{
            font-size:18px;
            margin:0;
        }

        .header-icon{
            font-size:45px;
            color:#0d6efd;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card todo-card">

        <div class="card-body p-5">

            <div class="text-center mb-4">
                <i class="bi bi-check2-square header-icon"></i>
                <h2 class="fw-bold mt-2">My Todo List</h2>
                <p class="text-muted">
                    Stay organized and productive
                </p>
            </div>

            <!-- Add Task Form -->
            <form th:action="@{/tasks}" method="post" class="row g-2">
                <div class="col-md-10">

                        <input
                                type="text"
                                class="form-control form-control-lg"
                                name="title"
                                placeholder="Enter a new task..."
                                required>

                </div>

                <div class="col-md-2 d-grid">
                    <button class="btn btn-primary btn-lg">
                        <i class="bi bi-plus-lg"></i> Add
                    </button>
                </div>

            </form>

            <hr class="my-4">

            <!-- Task Counter -->
            <div class="d-flex justify-content-between align-items-center mb-3">

                <h5 class="mb-0">Tasks</h5>

                <span class="badge bg-primary fs-6">
                    Total:
                    <span th:text="${tasks.size()}">0</span>
                </span>

            </div>

            <!-- Empty List -->
            <div
                    class="alert alert-light border text-center"
                    th:if="${tasks.isEmpty()}">

                <i class="bi bi-emoji-smile fs-3"></i>

                <p class="mb-0 mt-2">
                    No tasks yet. Add one above!
                </p>

            </div>

            <!-- Task List -->
            <div th:each="task : ${tasks}">

                <div class="card task-item mb-3"
                     th:classappend="${task.completed} ? ' opacity-75' : ''">

                    <div class="card-body d-flex justify-content-between align-items-center">

                        <!-- Left Side -->
                        <div class="d-flex align-items-center">

                            <!-- Toggle Button -->
                            <a th:href="@{/tasks/{id}/toggle(id=${task.id})}"
                               class="text-decoration-none me-3">

                                <i th:class="${task.completed}
                    ? 'bi bi-check-circle-fill text-success fs-4'
                    : 'bi bi-circle text-primary fs-4'"></i>

                            </a>

                            <!-- Task Title -->
                            <p class="task-title mb-0"
                               th:text="${task.title}"
                               th:style="${task.completed}
                   ? 'text-decoration: line-through; color: gray;'
                   : ''">

                                Sample Task

                            </p>

                        </div>

                        <!-- Right Side -->
                        <div>

                            <!-- Delete Button -->
                            <a th:href="@{/tasks/{id}/delete(id=${task.id})}"
                               class="btn btn-danger btn-sm">

                                <i class="bi bi-trash"></i>

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
