<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"></head>

<body>

<h1>Testing</h1>

<div class="mt-5 text-center">
    <form action="/tasks" method="post">

        <div>
            <input type="text" name="title" id="title" placeholder="Add a new task..." required>

        </div>
        <div>
            <button type="submit">Add</button>
        </div>
    </form>

    <p>
        Total Tasks:
        <span th:text="${tasks.size()}"></span>
    </p>

    <th:block th:each="task : ${tasks}">
        <p th:text="${task.title}"></p>
    </th:block>
</div>

</body>

</html>
