<!-- Div is a container used to hold other HTML elements or groups elements together
 and it is a block element -->
 <!-- And span is also a generic container used to hold other 
  HTML elements or group elements toghter
  it is a in line element -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div tags</title>
</head>
<body>
    <P>Using div tags</P>
    <div>
         <a href="www.google.com">Google </a>
         <a href="www.facebook.com">Facebook </a>
    
    </div>
    <a href="www.youtube.com">Youtube</a>
    <p> using span tags</p>
     <span>
         <a href="www.google.com">Google </a>
         <a href="www.facebook.com">Facebook </a>
    
     </span>
    <a href="www.youtube.com">Youtube</a>
   
   
    
</body>
</html>
