<!--Br tags are used to  start with new line like \n in C-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Br Tag</title>
</head>
<body>
    <P>
        before using br tag
        this is first line 
        this is second line 
    </P>
    <p>
        After using <b>br</b> tag<br> this is <u>First</u> line<br> This is<i>Second</i>  line
    </p>
</body>
</html>
