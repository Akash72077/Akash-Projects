<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alumni Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .profile-link {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: white;
    }
    .profile-link:hover {
      color: #ddd;
    }
    .profile-icon {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 8px;
      border: 2px solid #fff;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-success">
    <div class="container d-flex justify-content-between">
      <a class="navbar-brand fw-bold" href="#">Alumni Dashboard</a>
      <a href="AlumniProfile.html" class="profile-link">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Profile" class="profile-icon">
        <span>My Profile</span>
      </a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container mt-4">
    <h3>Welcome, Alumni 🎓</h3>

    <div class="row mt-4">
      <div class="col-md-4 mb-3">
        <div class="card p-3 shadow-sm">
          <h5>📝 Add/Update Details</h5>
          <p>Update your career, achievements, and current status.</p>
          <button class="btn btn-outline-success btn-sm">Update Now</button>
        </div>
      </div>

      <div class="col-md-4 mb-3">
        <div class="card p-3 shadow-sm">
          <h5>📂 Upload Data</h5>
          <p>Share documents, resumes, or certificates for verification.</p>
          <button class="btn btn-outline-primary btn-sm">Upload</button>
        </div>
      </div>

      <div class="col-md-4 mb-3">
        <div class="card p-3 shadow-sm">
          <h5>📢 Events</h5>
          <p>Organize and participate in alumni events & reunions.</p>
          <button class="btn btn-outline-dark btn-sm">View Events</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
