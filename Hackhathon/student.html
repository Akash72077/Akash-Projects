<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .profile-link {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: white;
    }
    .profile-link:hover {
      color: #ddd;
    }
    .profile-icon {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 8px;
      border: 2px solid #fff;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-primary">
    <div class="container d-flex justify-content-between">
      <a class="navbar-brand fw-bold" href="#">Student Dashboard</a>
      <a href="StudentProfile.html" class="profile-link">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Profile" class="profile-icon">
        <span>My Profile</span>
      </a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container mt-4">
    <h3>Welcome, Student 👨‍🎓</h3>

    <div class="row mt-4">
      <div class="col-md-4 mb-3">
        <div class="card p-3 shadow-sm">
          <h5>🔎 Search Alumni</h5>
          <p>Find alumni by batch, stream, or skills.</p>
          <a class="btn btn-outline-primary btn-sm">Search Now</a>
        </div>
      </div>

      <div class="col-md-4 mb-3">
        <div class="card p-3 shadow-sm">
          <h5>📢 Events</h5>
          <p>Join webinars, workshops, and reunions.</p>
          <button class="btn btn-outline-success btn-sm">View Events</button>
        </div>
      </div>

      <div class="col-md-4 mb-3">
        <div class="card p-3 shadow-sm">
          <h5>🤝 Mentorship</h5>
          <p>Request guidance from alumni mentors.</p>
          <button class="btn btn-outline-dark btn-sm">Request Mentor</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
