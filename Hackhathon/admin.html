<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-dark bg-danger">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">Admin Dashboard</a>
    </div>
  </nav>

  <div class="container mt-4">
    <h3>Welcome, Admin 🔑</h3>

    <div class="row mt-4">
      <div class="col-md-4 mb-3">
        <div class="card p-3 shadow-sm">
          <h5>✅ Verify Alumni</h5>
          <p>Approve alumni requests using roll number or ID.</p>
          <button class="btn btn-outline-danger btn-sm">Verify Now</button>
        </div>
      </div>

      <div class="col-md-4 mb-3">
        <div class="card p-3 shadow-sm">
          <h5>📊 Analytics</h5>
          <p>Track alumni placements & achievements.</p>
          <button class="btn btn-outline-dark btn-sm">View Stats</button>
        </div>
      </div>

      <div class="col-md-4 mb-3">
        <div class="card p-3 shadow-sm">
          <h5>📢 Announcements</h5>
          <p>Post notices, events, and circulars.</p>
          <button class="btn btn-outline-success btn-sm">Post Now</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
