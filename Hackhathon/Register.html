<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Form</title>
  <link rel="stylesheet" href="Register.css">
</head>
<body>
  <div class="form-container">
    <h2>Register Form</h2>
    <form>
      <!-- Name -->
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Enter your full name" required>
      <br><br>

      <!-- Email -->
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>
      <br><br>

      <!-- Password -->
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password" required>
      <br><br>


      <!-- Batch -->
      <label for="batch">Batch</label>
      <input type="text" id="batch" name="batch" placeholder="e.g. 2021-2025" required>
      <br><br>

      <!-- Profile Pic -->
      <label for="profile">Profile Picture URL</label>
      <input type="url" id="profile" name="profile" placeholder="Enter profile picture URL">
      <br><br>

      <!-- Education -->
      <label for="education">Education</label>
      <input type="text" id="education" name="education" placeholder="Enter your education details" required>
      <br><br>

      <!-- LinkedIn -->
      <label for="linkedin">LinkedIn</label>
      <input type="url" id="linkedin" name="linkedin" placeholder="LinkedIn profile link">
      <br><br>

      <!-- GitHub -->
      <label for="github">GitHub</label>
      <input type="url" id="github" name="github" placeholder="GitHub profile link">
      <br><br>

      <!-- Twitter -->
      <label for="twitter">Twitter</label>
      <input type="url" id="twitter" name="twitter" placeholder="Twitter profile link">
      <br><br>

      <!-- Instagram -->
      <label for="instagram">Instagram</label>
      <input type="url" id="instagram" name="instagram" placeholder="Instagram profile link">
      <br><br>

      <!-- Bio -->
      <label for="bio">Bio</label>
      <textarea id="bio" name="bio" placeholder="Write a short bio..." rows="4"></textarea>
      <br><br>

      <!-- Skills -->
      <label for="skills">Skills</label>
      <input type="text" id="skills" name="skills" placeholder="e.g. HTML, CSS, JavaScript">
      <br><br>

      <!-- Interests -->
      <label for="interests">Interests</label>
      <input type="text" id="interests" name="interests" placeholder="e.g. Web Dev, AI, Startups">
      <br><br>

      <!-- Submit Button -->
      <button type="submit">Submit</button>
      <br><br>

    </form>
  </div>
</body>
</html>
